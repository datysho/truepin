<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
      }
      body {
        margin: 0;
        width: 340px;
        line-height: 1.45;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px 8px;
      }
      header img {
        width: 18px;
        height: 18px;
      }
      header .name {
        font-weight: 600;
        font-size: 14px;
        flex: 1;
      }
      header a {
        color: inherit;
        opacity: 0.55;
        text-decoration: none;
        font-size: 15px;
      }
      section {
        padding: 8px 12px;
        border-top: 1px solid color-mix(in srgb, currentColor 12%, transparent);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .muted {
        opacity: 0.6;
        font-size: 12px;
      }
      .switch-label {
        flex: 1;
      }
      .tab-list {
        margin: 6px 0 0;
        padding: 0;
        list-style: none;
        max-height: 150px;
        overflow-y: auto;
      }
      .tab-list li {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 2px 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tab-list img {
        width: 14px;
        height: 14px;
        flex: none;
      }
      .tab-list .t {
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .save-row {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .save-row input {
        flex: 1;
        min-width: 0;
        padding: 4px 8px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        font: inherit;
      }
      button {
        font: inherit;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      button.primary {
        background: #e89422;
        border-color: #e89422;
        color: #1d1d20;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .snap {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
      }
      .snap .info {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .snap .x {
        border: none;
        padding: 2px 6px;
        opacity: 0.55;
      }
      .snap .x:hover {
        opacity: 1;
      }
      #status {
        min-height: 16px;
        padding: 2px 12px 8px;
        font-size: 12px;
        color: #2e7d32;
      }
      #status.err {
        color: #c62828;
      }
      h3 {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/locked-32.png" alt="" />
      <span class="name">TruePin</span>
      <a href="#" id="openOptions" title="Настройки">⚙</a>
    </header>

    <section>
      <label class="row">
        <span class="switch-label">Замок на этой вкладке</span>
        <input type="checkbox" id="lockToggle" />
      </label>
      <div class="muted" id="lockHint"></div>
    </section>

    <section>
      <h3>Закреплённые <span id="pinCount"></span></h3>
      <ul class="tab-list" id="pinnedList"></ul>
      <div class="save-row">
        <input type="text" id="snapName" placeholder="Имя набора (например, Работа)" maxlength="40" />
        <button class="primary" id="saveBtn">Сохранить</button>
      </div>
    </section>

    <section>
      <h3>Наборы</h3>
      <div id="snapList"></div>
    </section>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
