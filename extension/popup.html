<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --bg: #ffffff;
        --text: #202124;
        --muted: #5f6368;
        --border: #dadce0;
        --hover: #f1f3f4;
        --accent: #1a73e8;
        --on-accent: #ffffff;
        --track: #c4c7c5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #292a2d;
          --text: #e8eaed;
          --muted: #9aa0a6;
          --border: #3c4043;
          --hover: #3c4043;
          --accent: #8ab4f8;
          --on-accent: #202124;
          --track: #5f6368;
        }
      }
      body {
        margin: 0;
        width: 344px;
        font-size: 13px;
        line-height: 1.45;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px 10px;
      }
      header img {
        width: 20px;
        height: 20px;
      }
      header .name {
        font-weight: 600;
        font-size: 15px;
        flex: 1;
      }
      header a {
        color: var(--muted);
        text-decoration: none;
        font-size: 15px;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }
      header a:hover {
        background: var(--hover);
      }
      section {
        padding: 10px 16px;
        border-top: 1px solid var(--border);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .switch-label {
        flex: 1;
      }

      /* Material-style switch */
      input.switch {
        appearance: none;
        width: 38px;
        height: 22px;
        border-radius: 11px;
        background: var(--track);
        position: relative;
        cursor: pointer;
        transition: background 0.15s ease;
        flex: none;
        margin: 0;
      }
      input.switch::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        transition: transform 0.15s ease;
      }
      input.switch:checked {
        background: var(--accent);
      }
      input.switch:checked::before {
        transform: translateX(16px);
      }

      .tab-list {
        margin: 6px 0 0;
        padding: 0;
        list-style: none;
        max-height: 150px;
        overflow-y: auto;
      }
      .tab-list li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 6px;
        border-radius: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tab-list li:hover {
        background: var(--hover);
      }
      .tab-list img {
        width: 14px;
        height: 14px;
        flex: none;
      }
      .tab-list .t {
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .save-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .save-row input {
        flex: 1;
        min-width: 0;
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: inherit;
        font: inherit;
      }
      .save-row input:focus {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
        border-color: transparent;
      }
      button {
        font: inherit;
        font-weight: 500;
        padding: 5px 14px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        flex: none;
      }
      button:hover {
        background: color-mix(in srgb, var(--accent) 8%, transparent);
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--on-accent);
      }
      button.primary:hover {
        background: color-mix(in srgb, var(--accent) 90%, #000000);
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
        background: transparent;
      }
      button.primary:disabled {
        background: var(--track);
        border-color: var(--track);
        color: var(--bg);
      }
      .snap {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        margin: 0 -8px;
        border-radius: 8px;
      }
      .snap:hover {
        background: var(--hover);
      }
      .snap .info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .snap .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .snap .meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
      }
      .snap .x {
        border: none;
        width: 26px;
        height: 26px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        color: var(--muted);
        font-weight: 400;
      }
      .snap .x:hover {
        background: var(--hover);
        color: var(--text);
      }
      details {
        margin-top: 6px;
      }
      summary {
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        user-select: none;
        padding: 4px 0;
      }
      #status {
        min-height: 16px;
        padding: 2px 16px 10px;
        font-size: 12px;
        color: #188038;
      }
      @media (prefers-color-scheme: dark) {
        #status {
          color: #81c995;
        }
      }
      #status.err {
        color: #d93025;
      }
      h3 {
        margin: 2px 0 4px;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/locked-32.png" alt="" />
      <span class="name">TruePin</span>
      <a href="#" id="openOptions" data-i18n-title="optionsLink">⚙</a>
    </header>

    <section>
      <label class="row">
        <span class="switch-label" id="lockLabel"></span>
        <input type="checkbox" id="lockToggle" class="switch" />
      </label>
    </section>

    <section>
      <h3><span data-i18n="pinnedHeader"></span> <span id="pinCount"></span></h3>
      <ul class="tab-list" id="pinnedList"></ul>
      <div class="save-row">
        <input type="text" id="snapName" data-i18n-placeholder="snapNamePlaceholder" maxlength="40" />
        <button class="primary" id="saveBtn"></button>
      </div>
    </section>

    <section>
      <h3 data-i18n="snapsHeader"></h3>
      <div id="snapList"></div>
      <details id="autoDetails">
        <summary><span data-i18n="autoHeader"></span> <span id="autoCount"></span></summary>
        <div id="autoList"></div>
      </details>
    </section>

    <div id="status"></div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
