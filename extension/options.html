<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TruePin</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 16px;
        min-width: 400px;
        font-size: 14px;
        line-height: 1.5;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      label {
        display: flex;
        gap: 8px;
        align-items: baseline;
        margin: 10px 0 2px;
      }
      .hint {
        color: color-mix(in srgb, currentColor 60%, transparent);
        font-size: 12px;
        margin: 0 0 6px 26px;
      }
      .num {
        width: 60px;
      }
      select {
        font: inherit;
        padding: 2px 6px;
      }
      #saved {
        font-size: 12px;
        color: #2e7d32;
        visibility: hidden;
        margin: 10px 0 0;
      }
    </style>
  </head>
  <body>
    <h2>TruePin</h2>

    <label>
      <input type="checkbox" id="autoLockPinned" />
      <span data-i18n="optAutoLock"></span>
    </label>
    <p class="hint" data-i18n="optAutoLockHint"></p>

    <label>
      <input type="checkbox" id="showIcon" />
      <span data-i18n="optShowIcon"></span>
    </label>

    <label>
      <input type="checkbox" id="restoreClosed" />
      <span data-i18n="optRestoreNet"></span>
    </label>
    <p class="hint" data-i18n="optRestoreNetHint"></p>

    <label>
      <span data-i18n="optCooldownPre"></span>
      <input type="number" id="restoreCooldownSec" class="num" min="3" max="120" />
      <span data-i18n="optCooldownPost"></span>
    </label>

    <label>
      <input type="checkbox" id="mirrorPinned" />
      <span data-i18n="optMirror"></span>
    </label>
    <p class="hint" data-i18n="optMirrorHint"></p>

    <label>
      <input type="checkbox" id="autoSnapshot" />
      <span data-i18n="optAutoSnaps"></span>
    </label>
    <p class="hint" data-i18n="optAutoSnapsHint"></p>

    <label>
      <span data-i18n="optLang"></span>
      <select id="language">
        <option value="auto"></option>
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="uk">Українська</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="zh_CN">中文（简体）</option>
      </select>
    </label>

    <p id="saved" data-i18n="saved"></p>

    <script src="i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
